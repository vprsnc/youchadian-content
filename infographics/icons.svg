<?xml version="1.0" encoding="UTF-8"?>
<!-- Youchadian infographic icon sprite sheet.
     Reference icons in HTML with:
       <svg width="40" height="40"><use href="#icon-id"/></svg>
     Inject into the page with the loader snippet in each infographic's <script>. -->
<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="display:none">

  <!-- ── TEA CATEGORIES ─────────────────────────────────────────── -->

  <!-- Tea leaf: pointed top, wide middle, veined -->
  <symbol id="green-tea" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 5 C32 9 38 18 37 28 C36 37 30 43 24 43
               C18 43 12 37 11 28 C10 18 16 9 24 5Z"/>
      <line x1="24" y1="7"  x2="24" y2="41"/>
      <line x1="24" y1="20" x2="16" y2="29"/>
      <line x1="24" y1="20" x2="32" y2="29"/>
      <line x1="24" y1="30" x2="18" y2="37"/>
      <line x1="24" y1="30" x2="30" y2="37"/>
    </g>
  </symbol>

  <!-- Silver needle bud + two flanking leaves + stem -->
  <symbol id="white-tea" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 5 C27 11 28 20 27 29 C26.5 33 25 36 24 37
               C23 36 21.5 33 21 29 C20 20 21 11 24 5Z"/>
      <path d="M22 31 C18 26 12 28 11 33 C16 32 20 36 22 37"/>
      <path d="M26 31 C30 26 36 28 37 33 C32 32 28 36 26 37"/>
      <line x1="24" y1="37" x2="24" y2="43"/>
    </g>
  </symbol>

  <!-- Leaf with stipple dots — méndūn yellowing shown as surface texture change -->
  <symbol id="yellow-tea" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 7 C31 11 36 20 35 29 C34 37 29 42 24 43
               C19 42 14 37 13 29 C12 20 17 11 24 7Z"/>
      <line x1="24" y1="9"  x2="24" y2="41"/>
      <line x1="24" y1="21" x2="17" y2="30"/>
      <line x1="24" y1="21" x2="31" y2="30"/>
    </g>
    <g fill="currentColor" stroke="none" opacity="0.7">
      <circle cx="19" cy="23" r="1.4"/>
      <circle cx="22" cy="28" r="1.4"/>
      <circle cx="18" cy="33" r="1.4"/>
      <circle cx="21" cy="37" r="1.4"/>
      <circle cx="29" cy="23" r="1.4"/>
      <circle cx="30" cy="29" r="1.4"/>
      <circle cx="27" cy="35" r="1.4"/>
    </g>
  </symbol>

  <!-- Rolled pellet: outer oval + spiral sweep -->
  <symbol id="oolong" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="24" cy="25" rx="16" ry="13"/>
      <path d="M24 14 C33 14 38 19 38 25 C38 31 33 36 24 36
               C17 36 12 32 12 27 C12 22 16 19 21 19"/>
      <path d="M21 19 C24 19 27 21 27 24"/>
    </g>
  </symbol>

  <!-- Wide open leaf (full oxidation) + golden tip dot + strong veins -->
  <symbol id="red-tea" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 6 C36 10 43 20 41 31 C39 40 32 45 24 45
               C16 45 9 40 7 31 C5 20 12 10 24 6Z"/>
      <line x1="24" y1="8"  x2="24" y2="43"/>
      <circle cx="24" cy="7" r="3" fill="currentColor" stroke="none"/>
      <line x1="24" y1="20" x2="12" y2="32"/>
      <line x1="24" y1="20" x2="36" y2="32"/>
      <line x1="24" y1="32" x2="15" y2="41"/>
      <line x1="24" y1="32" x2="33" y2="41"/>
    </g>
  </symbol>

  <!-- Pǔ'ěr bing cake — 3/4 angle view showing compressed disc form -->
  <symbol id="dark-tea" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="24" cy="16" rx="17" ry="7"/>
      <line x1="7"  y1="16" x2="7"  y2="25"/>
      <line x1="41" y1="16" x2="41" y2="25"/>
      <path d="M7 25 C7 29.8 14.7 33 24 33 C33.3 33 41 29.8 41 25"/>
      <ellipse cx="24" cy="16" rx="10" ry="4"/>
      <circle cx="24" cy="16" r="2" fill="currentColor" stroke="none"/>
    </g>
  </symbol>


  <!-- ── TEAWARE ──────────────────────────────────────────────────── -->

  <!-- Gaiwan: saucer + bowl + lid with knob -->
  <symbol id="gaiwan" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 36 C8 40 40 40 40 36"/>
      <line x1="8"  y1="36" x2="40" y2="36"/>
      <path d="M12 36 C12 24 36 24 36 36"/>
      <path d="M15 24 C15 16 33 16 33 24"/>
      <line x1="14" y1="16" x2="34" y2="16"/>
      <line x1="24" y1="16" x2="24" y2="13"/>
      <circle cx="24" cy="12" r="2" fill="currentColor" stroke="none"/>
    </g>
  </symbol>

  <!-- Kettle: body + spout + handle + lid -->
  <symbol id="kettle" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 18 L10 37 C10 39 12 41 14 41
               L34 41 C36 41 38 39 38 37 L38 18
               C38 16 36 14 34 14 L14 14 C12 14 10 16 10 18Z"/>
      <path d="M38 22 C42 21 44 18 43 15 C42 13 40 13 38 16"/>
      <path d="M10 19 C6 19 4 23 4 27 C4 31 6 33 10 33"/>
      <line x1="15" y1="14" x2="33" y2="14"/>
      <path d="M19 14 C19 10 29 10 29 14"/>
    </g>
  </symbol>

  <!-- Water temperature / brewing -->
  <symbol id="water-drop" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 6 C24 6 9 22 9 31 C9 39 16 44 24 44
               C32 44 39 39 39 31 C39 22 24 6 24 6Z"/>
      <path d="M17 29 C17 24 20 21 24 20" stroke-width="1.5" opacity="0.55"/>
    </g>
  </symbol>

  <!-- Thermometer with tick marks -->
  <symbol id="thermometer" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="38" r="6"/>
      <circle cx="24" cy="38" r="3.5" fill="currentColor" stroke="none"/>
      <rect x="21" y="8" width="6" height="26" rx="3"/>
      <rect x="21" y="18" width="6" height="16" rx="2"
            fill="currentColor" stroke="none"/>
      <line x1="27" y1="13" x2="31" y2="13"/>
      <line x1="27" y1="19" x2="31" y2="19"/>
      <line x1="27" y1="25" x2="31" y2="25"/>
      <line x1="27" y1="31" x2="31" y2="31"/>
    </g>
  </symbol>

  <!-- Three wavy steam lines -->
  <symbol id="steam" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round">
      <path d="M14 40 C14 34 18 31 18 25 C18 19 14 16 14 10"/>
      <path d="M24 40 C24 34 28 31 28 25 C28 19 24 16 24 10"/>
      <path d="M34 40 C34 34 38 31 38 25 C38 19 34 16 34 10"/>
    </g>
  </symbol>

  <!-- Flame (for heat / kill-green step) -->
  <symbol id="flame" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M24 6 C24 6 30 14 30 22 C30 26 28 28 26 28
               C28 24 26 20 24 20
               C22 20 20 24 22 28
               C20 28 18 26 18 22
               C18 14 24 6 24 6Z"/>
      <path d="M16 36 C16 30 20 28 24 28 C28 28 32 30 32 36
               C32 40 29 43 24 43 C19 43 16 40 16 36Z"/>
    </g>
  </symbol>

  <!-- Bubbles (for boiling water stages) -->
  <symbol id="bubbles-small" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="1.8"
       stroke-linecap="round">
      <circle cx="18" cy="34" r="3"/>
      <circle cx="28" cy="30" r="3"/>
      <circle cx="22" cy="22" r="3"/>
      <circle cx="14" cy="26" r="2"/>
      <circle cx="32" cy="22" r="2"/>
    </g>
  </symbol>

  <symbol id="bubbles-medium" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round">
      <circle cx="16" cy="36" r="5"/>
      <circle cx="30" cy="32" r="5"/>
      <circle cx="22" cy="20" r="5"/>
      <circle cx="12" cy="24" r="3"/>
      <circle cx="36" cy="22" r="3"/>
    </g>
  </symbol>

  <symbol id="bubbles-large" viewBox="0 0 48 48">
    <g fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round">
      <circle cx="14" cy="36" r="7"/>
      <circle cx="30" cy="30" r="8"/>
      <circle cx="20" cy="18" r="7"/>
      <circle cx="38" cy="20" r="5"/>
      <circle cx="10" cy="22" r="4"/>
    </g>
  </symbol>

</svg>
