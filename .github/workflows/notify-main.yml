name: Notify main repo on content push

on:
  push:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync in youchadian
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CONTENT_SYNC_PAT }}" \
            https://api.github.com/repos/vprsnc/youchadian/dispatches \
            -d '{"event_type":"content-updated","client_payload":{"sha":"'"$GITHUB_SHA"'"}}'
